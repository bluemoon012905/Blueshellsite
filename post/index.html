<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <header id="post-hero" class="hero"></header>
      <section id="post-shell" class="section post-view"></section>
    </main>

    <script>
      loadPost().catch((error) => {
        document.getElementById("post-hero").innerHTML = `
          <div class="hero-copy">
            <p class="eyebrow">Post</p>
            <h1>Not available</h1>
            <p>${escapeHtml(error.message)}</p>
            <div class="hero-actions">
              <a class="ghost-link" href="/">Back home</a>
            </div>
          </div>
        `;
        document.getElementById("post-shell").innerHTML = '<p class="empty-state">That post could not be loaded.</p>';
      });

      async function loadPost() {
        const params = new URLSearchParams(window.location.search);
        const postId = params.get("post");
        if (!postId) {
          throw new Error("No post was provided.");
        }

        const response = await fetch("../data/content.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("Could not load content.");
        }

        const content = await response.json();
        const publishedPosts = (content.posts || []).filter((post) => post.published !== false);
        const post = publishedPosts.find((entry) => entry.id === postId);
        if (!post) {
          throw new Error("That post does not exist.");
        }

        const category = (content.categories || []).find((entry) => entry.id === post.category);
        const categoryName = category?.name || post.category;

        document.title = `${post.title} | ${content.site?.title || "Blue's collection"}`;
        document.getElementById("post-hero").innerHTML = `
          <div class="hero-nav">
            <div class="brand-mark">
              <span>${escapeHtml(content.site?.brandMark || content.site?.title || "Blue's collection")}</span>
            </div>
            <div class="hero-actions">
              <a class="ghost-link" href="/category/?category=${encodeURIComponent(post.category)}">Back to ${escapeHtml(categoryName)}</a>
              <a class="ghost-link" href="/">Back home</a>
            </div>
          </div>
          <div class="hero-copy">
            <p class="eyebrow">${escapeHtml(categoryName)}</p>
            <h1>${escapeHtml(post.title)}</h1>
            <p>${escapeHtml(post.summary)}</p>
          </div>
        `;

        document.getElementById("post-shell").innerHTML = `
          <div class="post-meta">
            <span class="tag">${formatDate(post.date)}</span>
            ${(post.tags || []).map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}
          </div>
          <div class="post-body">${renderPostBody(post)}</div>
        `;
      }

      function renderPostBody(post) {
        if (post.bodyFormat === "html") {
          return sanitizeRichHtml(post.body || "");
        }
        return renderMarkdown(post.body || "");
      }

      function renderMarkdown(markdown) {
        const lines = markdown.split("\n");
        const fragments = [];
        let listItems = [];

        const flushList = () => {
          if (!listItems.length) {
            return;
          }
          fragments.push(`<ul>${listItems.map((item) => `<li>${item}</li>`).join("")}</ul>`);
          listItems = [];
        };

        for (const rawLine of lines) {
          const line = rawLine.trim();
          if (!line) {
            flushList();
            continue;
          }

          if (line.startsWith("### ")) {
            flushList();
            fragments.push(`<h3>${escapeHtml(line.slice(4))}</h3>`);
            continue;
          }

          if (line.startsWith("## ")) {
            flushList();
            fragments.push(`<h2>${escapeHtml(line.slice(3))}</h2>`);
            continue;
          }

          if (line.startsWith("- ")) {
            listItems.push(escapeHtml(line.slice(2)));
            continue;
          }

          flushList();
          fragments.push(`<p>${escapeHtml(line)}</p>`);
        }

        flushList();
        return fragments.join("");
      }

      function sanitizeRichHtml(html) {
        const template = document.createElement("template");
        template.innerHTML = html;
        const disallowedTags = new Set(["script", "style", "iframe", "object", "embed", "meta", "link"]);
        const allowedStyleProps = new Set(["text-align", "color", "background-color", "font-family"]);

        const walk = (node) => {
          if (node.nodeType !== Node.ELEMENT_NODE) {
            return;
          }

          const tagName = node.tagName.toLowerCase();
          if (disallowedTags.has(tagName)) {
            node.remove();
            return;
          }

          [...node.attributes].forEach((attribute) => {
            const name = attribute.name.toLowerCase();
            const value = attribute.value;

            if (name.startsWith("on")) {
              node.removeAttribute(attribute.name);
              return;
            }

            if (name === "style") {
              const safeStyles = value
                .split(";")
                .map((rule) => rule.trim())
                .filter(Boolean)
                .filter((rule) => {
                  const [property, rawValue] = rule.split(":");
                  if (!property || !rawValue) {
                    return false;
                  }

                  const normalizedProperty = property.trim().toLowerCase();
                  const normalizedValue = rawValue.trim().toLowerCase();
                  return (
                    allowedStyleProps.has(normalizedProperty) &&
                    !normalizedValue.includes("url(") &&
                    !normalizedValue.includes("expression")
                  );
                });

              if (safeStyles.length) {
                node.setAttribute("style", safeStyles.join("; "));
              } else {
                node.removeAttribute("style");
              }
              return;
            }

            if (tagName === "img" && name === "src") {
              const safeSource =
                value.startsWith("data:image/") || value.startsWith("http://") || value.startsWith("https://") || value.startsWith("/");
              if (!safeSource) {
                node.removeAttribute(attribute.name);
              }
              return;
            }

            if ((name === "src" || name === "href") && value.trim().toLowerCase().startsWith("javascript:")) {
              node.removeAttribute(attribute.name);
            }
          });

          [...node.childNodes].forEach(walk);
        };

        [...template.content.childNodes].forEach(walk);
        return template.innerHTML;
      }

      function formatDate(value) {
        return new Date(`${value}T12:00:00`).toLocaleDateString(undefined, {
          year: "numeric",
          month: "long",
          day: "numeric",
        });
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }
    </script>
  </body>
</html>
