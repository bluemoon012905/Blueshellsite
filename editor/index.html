<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blue Shell Almanac Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="editor.css" />
  </head>
  <body>
    <div class="editor-shell">
      <aside class="sidebar">
        <div class="sidebar-head">
          <p class="eyebrow">Local editor</p>
          <h1>Blue Shell Almanac</h1>
          <p>Manage site copy and posts here. Saving writes directly to <code>data/content.json</code>.</p>
        </div>
        <div class="sidebar-actions">
          <button id="new-post-button" type="button">New post</button>
          <button id="save-button" type="button" class="secondary">Save all changes</button>
          <button id="export-button" type="button" class="secondary">Export backup</button>
          <a href="/" class="text-link">View public site</a>
        </div>
        <label class="search-box">
          <span class="visually-hidden">Search posts</span>
          <input id="post-search" type="search" placeholder="Search posts" />
        </label>
        <div id="post-list" class="post-list"></div>
      </aside>

      <main class="editor-main">
        <section class="panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Site settings</p>
              <h2>Homepage copy</h2>
            </div>
            <p id="status-message" class="status-message">Idle</p>
          </div>
          <div class="form-grid site-grid">
            <label>
              <span>Site title</span>
              <input id="site-title" type="text" />
            </label>
            <label>
              <span>Tagline</span>
              <input id="site-tagline" type="text" />
            </label>
            <label class="full-width">
              <span>Intro</span>
              <textarea id="site-intro" rows="4"></textarea>
            </label>
            <label class="full-width">
              <span>About</span>
              <textarea id="site-about" rows="4"></textarea>
            </label>
            <label>
              <span>Contact label</span>
              <input id="contact-label" type="text" />
            </label>
            <label>
              <span>Contact href</span>
              <input id="contact-href" type="text" />
            </label>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Categories</p>
              <h2>Section labels</h2>
            </div>
          </div>
          <div id="category-fields" class="category-fields"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Post editor</p>
              <h2 id="post-editor-heading">Select or create a post</h2>
            </div>
            <button id="delete-post-button" type="button" class="danger">Delete post</button>
          </div>
          <div id="post-editor" class="form-grid post-grid hidden">
            <label>
              <span>Post ID / slug</span>
              <input id="post-id" type="text" />
            </label>
            <label>
              <span>Title</span>
              <input id="post-title" type="text" />
            </label>
            <label>
              <span>Category</span>
              <select id="post-category"></select>
            </label>
            <label>
              <span>Date</span>
              <input id="post-date" type="date" />
            </label>
            <label>
              <span>Tags</span>
              <input id="post-tags" type="text" placeholder="comma, separated, tags" />
            </label>
            <label class="checkbox-row">
              <input id="post-featured" type="checkbox" />
              <span>Featured post</span>
            </label>
            <label class="full-width">
              <span>Summary</span>
              <textarea id="post-summary" rows="3"></textarea>
            </label>
            <label class="full-width">
              <span>Body (Markdown)</span>
              <textarea id="post-body" rows="14"></textarea>
            </label>
          </div>
        </section>
      </main>
    </div>
    <script src="editor.js" defer></script>
  </body>
</html>
